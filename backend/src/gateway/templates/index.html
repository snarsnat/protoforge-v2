<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>ProtoForge // Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-canvas: #0a0a0a;
            --bg-surface: #111111;
            --bg-panel: #1a1a1a;
            --bg-elevated: #222222;
            --text-primary: #f0f0f0;
            --text-secondary: #888888;
            --text-muted: #555555;
            --accent: #ff3e00;
            --accent-hover: #ff5722;
            --border-light: #1f1f1f;
            --border-medium: #333333;
            --success: #00c853;
            --warning: #ff9100;
            --error: #ff1744;
        }

        [data-theme="light"] {
            --bg-canvas: #f5f5f5;
            --bg-surface: #ffffff;
            --bg-panel: #eeeeee;
            --bg-elevated: #e0e0e0;
            --text-primary: #0a0a0a;
            --text-secondary: #555555;
            --text-muted: #999999;
            --accent: #d32f2f;
            --accent-hover: #b71c1c;
            --border-light: #e0e0e0;
            --border-medium: #bbbbbb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Mono', 'Space Mono', monospace;
            background: var(--bg-canvas);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            font-size: 13px;
            line-height: 1.5;
            transition: background 0.4s ease, color 0.4s ease;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-panel); }
        ::-webkit-scrollbar-thumb { background: var(--border-medium); }

        .app-container { display: flex; height: 100vh; }

        .sidebar { 
            width: 280px; 
            background: var(--bg-surface); 
            border-right: 2px solid var(--border-light); 
            display: flex; 
            flex-direction: column;
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        .sidebar-header { 
            padding: 20px; 
            border-bottom: 2px solid var(--border-light);
            background: var(--bg-panel);
        }

        .logo-section { display: flex; align-items: center; justify-content: space-between; }

        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text-primary); }

        .logo-icon { 
            width: 40px; height: 40px; background: var(--accent); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 14px; color: white;
            border-radius: 0; 
        }

        .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -1px; text-transform: uppercase; }

        .theme-toggle {
            width: 36px; height: 36px;
            background: var(--bg-elevated);
            border: 2px solid var(--border-medium);
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            font-size: 16px; transition: all 0.3s ease;
            border-radius: 0;
        }

        .theme-toggle:hover { background: var(--accent); border-color: var(--accent); }

        .credits-display {
            margin-top: 16px; padding: 12px;
            background: var(--bg-surface);
            border: 2px solid var(--border-light);
        }

        .credits-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 4px; }
        .credits-amount { font-size: 20px; font-weight: 700; color: var(--accent); }
        .credits-free { font-size: 10px; color: var(--success); margin-top: 4px; }

        .deposit-btn {
            margin-top: 8px; width: 100%; padding: 8px;
            background: transparent; border: 2px solid var(--accent);
            color: var(--accent); font-family: inherit;
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s ease; border-radius: 0;
        }

        .deposit-btn:hover { background: var(--accent); color: white; }

        .new-project-btn { 
            margin-top: 16px; width: 100%; padding: 14px 16px; 
            background: var(--accent); border: none; color: white; 
            font-size: 12px; font-weight: 600; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            gap: 8px; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s ease; border-radius: 0;
        }

        .new-project-btn:hover { background: var(--accent-hover); transform: translateY(-2px); }

        .sidebar-nav { padding: 16px 12px; flex: 1; overflow-y: auto; }
        .nav-section { margin-bottom: 24px; }
        .nav-section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); padding: 0 12px; margin-bottom: 8px; }

        .mode-buttons { display: flex; flex-direction: column; gap: 0; background: var(--bg-panel); border: 2px solid var(--border-light); }

        .mode-btn { 
            padding: 14px 16px; background: transparent; border: none; 
            border-bottom: 1px solid var(--border-light);
            color: var(--text-secondary); font-size: 12px; font-weight: 500; 
            cursor: pointer; text-align: left; transition: all 0.3s ease;
            font-family: inherit; display: flex; align-items: center; gap: 12px; border-radius: 0;
        }

        .mode-btn:last-child { border-bottom: none; }
        .mode-btn:hover { background: var(--bg-elevated); color: var(--text-primary); padding-left: 20px; }
        .mode-btn.active { background: var(--accent); color: white; }

        .project-list { padding: 0; }
        .project-item { padding: 12px 16px; cursor: pointer; transition: all 0.3s ease; border-bottom: 1px solid var(--border-light); border-radius: 0; }
        .project-item:hover { background: var(--bg-elevated); }
        .project-item.active { background: var(--bg-elevated); border-left: 3px solid var(--accent); }
        .project-name { font-size: 12px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .project-meta { font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .project-status { width: 6px; height: 6px; background: var(--success); }
        .project-status.processing { background: var(--warning); animation: pulse 1s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .config-section { padding: 16px; border-top: 2px solid var(--border-light); background: var(--bg-panel); }
        .config-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 12px; }
        .config-select, .config-input { width: 100%; padding: 10px 12px; background: var(--bg-surface); border: 2px solid var(--border-light); color: var(--text-primary); font-size: 11px; margin-bottom: 10px; font-family: inherit; transition: all 0.3s ease; border-radius: 0; }
        .config-select:focus, .config-input:focus { outline: none; border-color: var(--accent); }
        .config-btn { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-size: 11px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; border-radius: 0; }
        .config-btn:hover { background: var(--accent-hover); }

        .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-canvas); transition: background 0.4s ease; }
        .main-header { height: 56px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--border-light); background: var(--bg-surface); transition: all 0.4s ease; }
        .breadcrumb { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-secondary); }
        .breadcrumb a { color: var(--text-secondary); text-decoration: none; }
        .breadcrumb a:hover { color: var(--text-primary); }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .header-btn { padding: 8px 16px; font-size: 11px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.3s ease; background: transparent; border: 2px solid var(--border-medium); color: var(--text-secondary); font-family: inherit; text-transform: uppercase; letter-spacing: 0.5px; border-radius: 0; }
        .header-btn:hover { background: var(--bg-elevated); color: var(--text-primary); }
        .header-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
        .header-btn.primary:hover { background: var(--accent-hover); }
        .header-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .chat-area { flex: 1; display: flex; overflow: hidden; }
        .chat-panel { flex: 1; display: flex; flex-direction: column; border-right: 2px solid var(--border-light); min-width: 0; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 24px; }

        .message { margin-bottom: 20px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { text-align: right; }
        .message-content { display: inline-block; max-width: 80%; padding: 16px 20px; border-radius: 0; }
        .message.user .message-content { background: var(--accent); color: white; }
        .message.ai .message-content { background: var(--bg-panel); border: 1px solid var(--border-light); }

        .chat-input-area { padding: 16px 24px; background: var(--bg-surface); border-top: 2px solid var(--border-light); }
        .chat-input-wrapper { display: flex; gap: 12px; }
        .chat-input { flex: 1; padding: 14px 18px; background: var(--bg-panel); border: 2px solid var(--border-light); color: var(--text-primary); font-size: 13px; font-family: inherit; resize: none; transition: all 0.3s ease; border-radius: 0; }
        .chat-input:focus { outline: none; border-color: var(--accent); }
        .chat-input::placeholder { color: var(--text-muted); }
        .send-btn { padding: 14px 24px; background: var(--accent); border: none; color: white; font-size: 12px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; border-radius: 0; }
        .send-btn:hover { background: var(--accent-hover); }
        .send-btn:disabled { background: var(--border-medium); cursor: not-allowed; }

        .preview-panel { width: 45%; display: flex; flex-direction: column; background: var(--bg-surface); }
        .preview-tabs { display: flex; border-bottom: 2px solid var(--border-light); background: var(--bg-panel); }
        .preview-tab { padding: 12px 20px; background: transparent; border: none; color: var(--text-secondary); font-size: 11px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -2px; border-radius: 0; }
        .preview-tab:hover { color: var(--text-primary); }
        .preview-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .preview-content { flex: 1; overflow: hidden; position: relative; }
        .preview-frame { width: 100%; height: 100%; border: none; display: none; }
        .preview-frame.active { display: block; }
        .preview-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

        .files-view { flex: 1; overflow-y: auto; padding: 16px; display: none; }
        .files-view.active { display: block; }
        .file-item { padding: 10px 14px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 10px; border-radius: 0; border-left: 2px solid transparent; }
        .file-item:hover { background: var(--bg-elevated); border-left-color: var(--accent); }
        .file-icon { font-size: 14px; }
        .file-name { flex: 1; }
        .file-type { font-size: 9px; text-transform: uppercase; color: var(--text-muted); padding: 2px 6px; background: var(--bg-panel); border: 1px solid var(--border-light); }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 40px; text-align: center; }
        .empty-state-icon { width: 80px; height: 80px; background: var(--bg-panel); border: 2px solid var(--border-medium); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; font-size: 32px; }
        .empty-state-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .empty-state-desc { font-size: 12px; color: var(--text-secondary); max-width: 300px; }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 12px 20px; background: var(--bg-panel); border: 2px solid var(--border-medium); color: var(--text-primary); font-size: 12px; animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 10px; border-radius: 0; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--error); }

        .loading-indicator { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 12px; padding: 16px; }
        .loading-dots { display: flex; gap: 4px; }
        .loading-dots span { width: 6px; height: 6px; background: var(--accent); animation: bounce 1.4s infinite ease-in-out; }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        @media (max-width: 1024px) { .preview-panel { display: none; } }
        @media (max-width: 768px) { .sidebar { width: 220px; } }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-section">
                    <a href="#" class="logo">
                        <div class="logo-icon">PF</div>
                        <span class="logo-text">ProtoForge</span>
                    </a>
                    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                        <span id="theme-icon">☀</span>
                    </button>
                </div>
                <div class="credits-display">
                    <div class="credits-label">Credits</div>
                    <div class="credits-amount">$<span id="credit-balance">0.00</span></div>
                    <div class="credits-free" id="free-prompts">1 free prompt available</div>
                    <button class="deposit-btn" onclick="showDepositModal()">+ Deposit</button>
                </div>
                <button class="new-project-btn" onclick="newProject()">
                    <span>+</span> New Project
                </button>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Mode</div>
                    <div class="mode-buttons">
                        <button class="mode-btn active" data-mode="software" onclick="setMode('software')"><span>💻</span> Software</button>
                        <button class="mode-btn" data-mode="hardware" onclick="setMode('hardware')"><span>⚡</span> Hardware</button>
                        <button class="mode-btn" data-mode="hybrid" onclick="setMode('hybrid')"><span>🔗</span> Hybrid</button>
                    </div>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">Projects</div>
                    <div class="project-list" id="project-list"></div>
                </div>
            </nav>
            <div class="config-section">
                <div class="config-title">API Configuration</div>
                <select class="config-select" id="provider">
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic</option>
                    <option value="deepseek">DeepSeek</option>
                    <option value="minimax">MiniMax</option>
                    <option value="kimi">Kimi (Moonshot)</option>
                    <option value="zhipu">Zhipu (GLM)</option>
                    <option value="qwen">Qwen</option>
                    <option value="volcengine">Volcano Engine</option>
                    <option value="siliconflow">SiliconFlow</option>
                    <option value="together">Together AI</option>
                    <option value="groq">Groq</option>
                </select>
                <input type="password" class="config-input" id="apiKey" placeholder="Enter API key...">
                <button class="config-btn" onclick="connect()">Connect</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="breadcrumb">
                    <a href="#">ProtoForge</a>
                    <span>/</span>
                    <span id="current-project">New Project</span>
                </div>
                <div class="header-actions">
                    <button class="header-btn" onclick="downloadAll()" id="download-btn" disabled>⬇ Download</button>
                    <button class="header-btn primary" onclick="shareProject()">Share</button>
                </div>
            </header>

            <div class="chat-area">
                <div class="chat-panel">
                    <div class="chat-messages" id="chat-messages"></div>
                    <div class="chat-input-area">
                        <div class="chat-input-wrapper">
                            <textarea class="chat-input" id="chat-input" placeholder="Describe what you want to build..." rows="1" onkeydown="handleInputKey(event)"></textarea>
                            <button class="send-btn" onclick="sendMessage()" id="send-btn">Build</button>
                        </div>
                    </div>
                </div>

                <div class="preview-panel">
                    <div class="preview-tabs">
                        <button class="preview-tab active" onclick="setPreviewTab('preview')">Preview</button>
                        <button class="preview-tab" onclick="setPreviewTab('code')">Code</button>
                        <button class="preview-tab" onclick="setPreviewTab('files')">Files</button>
                    </div>
                    <div class="preview-content">
                        <div class="preview-placeholder" id="preview-placeholder">Build a project to see preview</div>
                        <iframe class="preview-frame" id="preview-frame"></iframe>
                        <div class="files-view" id="files-view"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        const API_BASE = '';
        let config = { provider: 'openai', api_key: '' };
        let currentMode = 'software';
        let currentProject = null;
        let generatedFiles = [];
        let projects = [];
        let userCredits = { balance: 0, freePrompts: 1 };

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.getAttribute('data-theme') === 'light') {
                html.setAttribute('data-theme', 'dark');
                icon.textContent = '☀';
                localStorage.setItem('theme', 'dark');
            } else {
                html.setAttribute('data-theme', 'light');
                icon.textContent = '☾';
                localStorage.setItem('theme', 'light');
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('theme-icon').textContent = '☾';
        }

        function init() {
            loadConfig();
            loadProjects();
            loadCredits();
            renderProjects();
            if (projects.length === 0) {
                addMessage('Welcome to ProtoForge. Select a mode, enter your API key, and describe what you want to build.', 'ai');
            }
        }

        function loadConfig() {
            const saved = localStorage.getItem('protoforge_config');
            if (saved) {
                config = JSON.parse(saved);
                document.getElementById('provider').value = config.provider;
                document.getElementById('apiKey').value = config.api_key;
                updateStatus(true);
            }
        }

        function saveConfig() {
            localStorage.setItem('protoforge_config', JSON.stringify(config));
        }

        async function loadCredits() {
            const userId = config.api_key ? config.api_key.slice(0, 8) : 'anonymous';
            try {
                const res = await fetch(API_BASE + '/api/credits/balance/' + userId);
                if (res.ok) {
                    const data = await res.json();
                    userCredits = { balance: data.balance || 0, freePrompts: data.free_prompts_remaining || 0 };
                    updateCreditsDisplay();
                }
            } catch (e) { console.log('Credits API not available'); }
        }

        function updateCreditsDisplay() {
            document.getElementById('credit-balance').textContent = userCredits.balance.toFixed(2);
            document.getElementById('free-prompts').textContent = userCredits.freePrompts > 0 ? `${userCredits.freePrompts} free prompt${userCredits.freePrompts > 1 ? 's' : ''} available` : 'No free prompts';
        }

        async function checkCredits() {
            const userId = config.api_key.slice(0, 8);
            try {
                const res = await fetch(API_BASE + '/api/credits/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, mode: currentMode })
                });
                const data = await res.json();
                if (!data.can_prompt) { showToast(data.message, 'error'); return false; }
                return true;
            } catch (e) { return true; }
        }

        function showDepositModal() {
            const amount = prompt('Enter amount to deposit ($):');
            if (amount) { depositCredits(parseFloat(amount)); }
        }

        async function depositCredits(amount) {
            const userId = config.api_key.slice(0, 8);
            try {
                const res = await fetch(API_BASE + '/api/credits/deposit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, amount: amount })
                });
                const data = await res.json();
                userCredits.balance = data.new_balance;
                updateCreditsDisplay();
                showToast('Deposited $' + amount, 'success');
            } catch (e) { showToast('Deposit failed', 'error'); }
        }

        function connect() {
            const provider = document.getElementById('provider').value;
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) { showToast('Please enter an API key', 'error'); return; }
            config = { provider, api_key: apiKey };
            saveConfig();
            updateStatus(true);
            loadCredits();
            showToast('Connected to ' + provider.toUpperCase(), 'success');
        }

        function updateStatus(connected) {
            document.querySelector('.config-btn').textContent = connected ? 'Connected' : 'Connect';
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            showToast(currentMode.charAt(0).toUpperCase() + currentMode.slice(1) + ' mode', 'success');
        }

        function loadProjects() {
            const saved = localStorage.getItem('protoforge_projects');
            projects = saved ? JSON.parse(saved) : [];
        }

        function saveProjects() {
            localStorage.setItem('protoforge_projects', JSON.stringify(projects));
        }

        function renderProjects() {
            const list = document.getElementById('project-list');
            if (projects.length === 0) {
                list.innerHTML = '<div class="empty-state" style="padding: 20px;"><p style="color: var(--text-muted); font-size: 11px;">No projects yet</p></div>';
                return;
            }
            list.innerHTML = projects.map((p, i) => `
                <div class="project-item ${currentProject === i ? 'active' : ''}" onclick="selectProject(${i})">
                    <div class="project-name">${p.name}</div>
                    <div class="project-meta">
                        <div class="project-status ${p.status === 'processing' ? 'processing' : ''}"></div>
                        <span>${p.mode}</span>
                        <span>•</span>
                        <span>${p.time}</span>
                    </div>
                </div>
            `).join('');
        }

        function newProject() {
            currentProject = null;
            document.getElementById('current-project').textContent = 'New Project';
            document.getElementById('chat-messages').innerHTML = '';
            document.getElementById('chat-input').value = '';
            generatedFiles = [];
            updatePreview();
            renderProjects();
        }

        function selectProject(index) {
            currentProject = index;
            const project = projects[index];
            document.getElementById('current-project').textContent = project.name;
            generatedFiles = project.files || [];
            renderProjects();
            updatePreview();
        }

        function handleInputKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;
            if (!config.api_key) { showToast('Please enter your API key first', 'error'); return; }

            const canProceed = await checkCredits();
            if (!canProceed) return;

            addMessage(message, 'user');
            input.value = '';
            addMessage('Building your ' + currentMode + ' project...', 'ai', true);

            try {
                const res = await fetch(API_BASE + '/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: message, mode: currentMode, api_key: config.api_key, provider: config.provider })
                });
                
                const data = await res.json();
                const loading = document.querySelector('.loading-indicator');
                if (loading) loading.parentElement.remove();
                
                if (data.error) {
                    addMessage('Error: ' + data.error, 'ai');
                    showToast(data.error, 'error');
                } else {
                    generatedFiles = data.files || [];
                    const modeText = currentMode === 'hardware' ? '3D models, circuits, BOMs' : currentMode === 'hybrid' ? 'software and hardware' : 'web application files';
                    addMessage('Generated ' + (generatedFiles.length || 0) + ' ' + currentMode + ' files. Check the Files tab to download.', 'ai');
                    
                    const projectName = 'Project ' + new Date().toLocaleTimeString();
                    const newProject = { name: projectName, mode: currentMode, time: 'Just now', status: 'ready', files: generatedFiles };
                    projects.unshift(newProject);
                    currentProject = 0;
                    saveProjects();
                    renderProjects();
                    document.getElementById('current-project').textContent = projectName;
                    document.getElementById('download-btn').disabled = false;
                    
                    updatePreview();
                    loadCredits();
                    showToast('Build complete!', 'success');
                }
            } catch (e) {
                addMessage('Error: ' + e.message, 'ai');
                showToast('Build failed', 'error');
            }
        }

        function addMessage(content, role, loading = false) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'message ' + role;
            
            if (loading) {
                div.innerHTML = '<div class="message-content"><div class="loading-indicator"><div class="loading-dots"><span></span><span></span></div>Building...</div></div>';
            } else {
                div.innerHTML = '<div class="message-content">' + content + '</div>';
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function setPreviewTab(tab) {
            document.querySelectorAll('.preview-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('preview-placeholder').style.display = 'none';
            document.getElementById('preview-frame').classList.remove('active');
            document.getElementById('files-view').classList.remove('active');
            
            if (tab === 'preview') {
                document.getElementById('preview-placeholder').style.display = 'flex';
            } else if (tab === 'files') {
                renderFiles();
                document.getElementById('files-view').classList.add('active');
            }
        }

        function renderFiles() {
            const view = document.getElementById('files-view');
            if (generatedFiles.length === 0) {
                view.innerHTML = '<div class="empty-state"><h3 class="empty-state-title">No files</h3><p class="empty-state-desc">Build a project first</p></div>';
                return;
            }
            view.innerHTML = '<div class="file-tree">' + generatedFiles.map(f => 
                '<div class="file-item" onclick="downloadFile(\'' + f.name + '\')"><span class="file-icon">📄</span><span class="file-name">' + f.name + '</span><span class="file-type">' + f.type + '</span></div>'
            ).join('') + '</div>';
        }

        function updatePreview() {
            document.getElementById('download-btn').disabled = generatedFiles.length === 0;
            if (generatedFiles.length > 0) {
                document.getElementById('preview-placeholder').textContent = 'Switch to Files tab to download';
            }
        }

        function downloadFile(filename) {
            showToast('Download: ' + filename, 'success');
        }

        function downloadAll() {
            if (generatedFiles.length === 0) { showToast('No files to download', 'error'); return; }
            showToast('Preparing download...', 'success');
        }

        function shareProject() {
            showToast('Share feature coming soon', 'success');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        init();
    </script>
</body>
</html>
